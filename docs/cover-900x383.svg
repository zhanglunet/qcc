<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 383" width="900" height="383">
  <!-- 米白底 -->
  <rect width="900" height="383" fill="#f5f1e8"/>

  <!-- 左侧色块装饰 -->
  <rect x="0" y="0" width="14" height="383" fill="#c8523a"/>
  <rect x="22" y="0" width="4" height="383" fill="#1a3d2e"/>

  <!-- 右上角技术参数列 -->
  <g font-family="Georgia, 'Songti SC', serif" fill="#1a3d2e">
    <text x="780" y="50" font-size="13" font-style="italic" fill="#7a7770" text-anchor="end">SERVERS</text>
    <text x="850" y="50" font-size="20" font-weight="700" text-anchor="end">6</text>
    <text x="780" y="80" font-size="13" font-style="italic" fill="#7a7770" text-anchor="end">TOOLS</text>
    <text x="850" y="80" font-size="20" font-weight="700" text-anchor="end">146</text>
    <text x="780" y="110" font-size="13" font-style="italic" fill="#7a7770" text-anchor="end">SKILLS</text>
    <text x="850" y="110" font-size="20" font-weight="700" text-anchor="end">8</text>
    <text x="780" y="140" font-size="13" font-style="italic" fill="#7a7770" text-anchor="end">RUNTIMES</text>
    <text x="850" y="140" font-size="20" font-weight="700" font-style="italic" fill="#c8523a" text-anchor="end">4</text>
  </g>

  <!-- 主标题 -->
  <g font-family="Georgia, 'Songti SC', serif">
    <text x="70" y="125" font-size="44" font-weight="700" fill="#1a3d2e" letter-spacing="-1">把企查查塞进</text>
    <text x="70" y="180" font-size="56" font-weight="700" fill="#1a3d2e" letter-spacing="-1">任何一个 <tspan fill="#c8523a" font-style="italic">AI Agent</tspan>.</text>
  </g>

  <!-- 副标题 -->
  <g font-family="-apple-system, 'PingFang SC', sans-serif">
    <text x="70" y="230" font-size="17" fill="#5a5852" letter-spacing="0.5">
      KYB · 尽调 · 投后监控 · 供应商准入
    </text>
    <text x="70" y="260" font-size="15" fill="#7a7770" letter-spacing="0.3">
      6 MCP server · 146 tool · 8 工作流 skill · 4 种接入运行时
    </text>
  </g>

  <!-- 底部分割线 + 仓库标识 -->
  <line x1="70" y1="310" x2="830" y2="310" stroke="#d4ccb7" stroke-width="1"/>
  <g font-family="'SF Mono', Consolas, monospace">
    <text x="70" y="345" font-size="14" fill="#1a3d2e" font-weight="600">github.com/zhanglunet/qcc</text>
    <text x="830" y="345" font-size="12" fill="#7a7770" text-anchor="end">Apache-2.0 · Open Source</text>
  </g>
</svg>
